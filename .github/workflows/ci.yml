name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build & test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Install a software Vulkan implementation on Linux so the real-Vulkan
      # integration test (and any GPU examples) can actually run in CI.
      # Lavapipe is Mesa's Vulkan software rasterizer — it implements the
      # Vulkan 1.3 API in software and is good enough to validate that our
      # generated bindings work end-to-end against a real driver.
      - name: Install Lavapipe (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers vulkan-tools
          # Verify the loader can find the ICD
          vulkaninfo --summary || true

      # vk.xml is downloaded automatically via the fetch-spec feature on CI
      # so we don't need to vendor a copy of the spec.
      - name: Build (default features)
        run: cargo build -p spock --features fetch-spec

      - name: Build (no default features)
        run: cargo build -p spock --features fetch-spec --no-default-features

      - name: Build with naga feature
        run: cargo build -p spock --features fetch-spec,naga

      - name: Run unit tests (no naga)
        # On Linux, Lavapipe is installed above so the real-Vulkan integration
        # test will actually exercise the loader against a software Vulkan
        # implementation. On Windows/macOS the test gracefully skips if no
        # driver is found.
        run: cargo test --workspace --features fetch-spec

      - name: Run unit tests (with naga)
        # Re-run with the naga feature on so the GLSL compilation tests
        # actually execute. They don't require a Vulkan driver.
        run: cargo test --workspace --features fetch-spec,naga

      - name: Build examples
        run: |
          cargo build -p spock --features fetch-spec --example device_info
          cargo build -p spock --features fetch-spec --example fill_buffer
          cargo build -p spock --features fetch-spec --example compute_square
          cargo build -p spock --features fetch-spec,naga --example compile_shader

      - name: Run examples on Linux (with Lavapipe)
        if: runner.os == 'Linux'
        run: |
          cargo run -p spock --features fetch-spec --example device_info
          cargo run -p spock --features fetch-spec --example fill_buffer
          cargo run -p spock --features fetch-spec --example compute_square

  docs:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      # Build the documentation with all features enabled and treat any
      # broken intra-doc link as an error. This is what docs.rs will do
      # when the crate is published.
      - name: Build documentation
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --features fetch-spec --no-deps

  format:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Run clippy
        run: cargo clippy --workspace --features fetch-spec -- -D warnings
